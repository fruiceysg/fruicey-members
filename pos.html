<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Fruicey POS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--pink:#E91E8C;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--r:8px}
body{font-family:var(--font);background:#f0f2f5;color:#111;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

.top-bar{background:#fff;padding:8px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #e8e8e8;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.top-bar img{height:28px}
.top-title{font-size:13px;font-weight:600;color:#555}
.top-right{margin-left:auto;display:flex;align-items:center;gap:8px}
#clock{font-size:12px;color:#888}
.sales-btn{padding:5px 11px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:12px;color:#555;font-family:var(--font);display:flex;align-items:center;gap:5px}

.layout{display:flex;flex:1;overflow:hidden}

.catalogue{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

.cat-tabs{display:flex;background:#fff;border-bottom:1px solid #e8e8e8;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{padding:8px 10px;border:none;background:none;cursor:pointer;font-family:var(--font);text-align:center;min-width:70px;flex-shrink:0;transition:border .15s,color .15s;line-height:1.4}

.member-bar{background:#fff;border-bottom:1px solid #e8e8e8;padding:7px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0}
.member-bar input{flex:1;padding:7px 10px;border:1.5px solid #e0e0e0;border-radius:var(--r);font-size:13px;font-family:var(--font);outline:none;min-width:0}
.member-bar input:focus{border-color:var(--pink)}
.mbtn{padding:7px 12px;border-radius:var(--r);border:none;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:500;white-space:nowrap;flex-shrink:0}
.mbtn-lookup{background:#111;color:#fff}
.mbtn-clear{background:#f5f5f5;color:#666;border:1px solid #e0e0e0!important}
.member-result{background:#f0faf4;border:1px solid #c8e6c9;border-radius:var(--r);padding:8px 12px;margin:0 10px 4px}

.product-grid{flex:1;overflow-y:auto;padding:10px;display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:8px;align-content:start}
.product-card{background:#fff;border-radius:var(--r);border:1px solid #eee;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.pname{font-size:12px;font-weight:600;color:#111;margin-bottom:7px;line-height:1.35;min-height:28px}
.sbwrap{display:flex;flex-wrap:wrap;gap:4px}
.size-btn{padding:5px 8px;border-radius:5px;border:1.5px solid;background:#fff;cursor:pointer;font-size:11px;font-weight:600;font-family:var(--font);transition:background .12s,color .12s;white-space:nowrap}

.cart-panel{width:288px;background:#fff;display:flex;flex-direction:column;border-left:1px solid #e8e8e8;flex-shrink:0}
.cart-hdr{padding:10px 14px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cart-hdr-title{font-size:14px;font-weight:700}
.clr-btn{padding:4px 10px;font-size:11px;border-radius:5px;border:1px solid #e0e0e0;background:none;cursor:pointer;color:#888;font-family:var(--font)}
.cart-items{flex:1;overflow-y:auto}
.cart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:2rem}
.cart-row{display:flex;align-items:center;gap:5px;padding:8px 10px;border-bottom:0.5px solid #f5f5f5}
.cart-info{flex:1;min-width:0}
.cname{font-size:12px;font-weight:500;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cqbtn{width:24px;height:24px;border-radius:50%;border:1.5px solid #e0e0e0;background:#fafafa;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:#333;font-family:var(--font);flex-shrink:0;line-height:1}
.cdel{width:20px;height:20px;border-radius:50%;border:none;background:#fef0f0;cursor:pointer;color:#e74c3c;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.cart-footer{flex-shrink:0;padding:10px 12px;border-top:1px solid #eee}
.summary-row{display:flex;justify-content:space-between;font-size:13px;color:#888;margin-bottom:4px}
.disc-row{display:none;justify-content:space-between;font-size:13px;color:#27ae60;font-weight:500;margin-bottom:4px}
.total-row{display:flex;justify-content:space-between;font-size:18px;font-weight:700;margin:8px 0 10px}
.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}
.pay-btn{padding:8px 4px;border:1.5px solid #e0e0e0;border-radius:var(--r);background:#fff;cursor:pointer;font-size:12px;font-weight:500;font-family:var(--font);color:#666;transition:all .15s;text-align:center}
.pay-active{border-color:#111!important;background:#111!important;color:#fff!important}
.charge-btn{width:100%;padding:13px;background:var(--pink);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font)}
.charge-btn:disabled{background:#ccc;cursor:not-allowed}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal-box{background:#fff;border-radius:12px;width:100%;max-width:360px;max-height:90dvh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #eee;position:sticky;top:0;background:#fff;z-index:1}
.modal-hdr-title{font-size:15px;font-weight:700}
.modal-close{width:28px;height:28px;border-radius:50%;border:none;background:#f5f5f5;cursor:pointer;font-size:14px;color:#555}
.modal-body{padding:16px}
.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
.btn-done{padding:11px;background:#111;color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font)}
.btn-print{padding:11px;background:#fff;border:1.5px solid #ddd;border-radius:var(--r);cursor:pointer;font-size:14px;font-family:var(--font);color:#555}

.sales-modal-box{background:#fff;border-radius:12px;width:100%;max-width:480px;max-height:90dvh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.sales-body{flex:1;overflow-y:auto;padding:16px}
.sales-footer{display:flex;gap:8px;padding:12px 16px;border-top:1px solid #eee;flex-shrink:0}
.sales-footer button{flex:1;padding:9px;border-radius:var(--r);cursor:pointer;font-size:13px;font-family:var(--font);font-weight:500}
.btn-export{background:#27ae60;color:#fff;border:none}
.btn-clr-sales{background:#fff;color:#e74c3c;border:1.5px solid #e74c3c}
.stat-box{background:#f9f9f9;border-radius:8px;padding:10px;text-align:center}
.stat-val{font-size:18px;font-weight:700;color:#111}
.stat-lbl{font-size:10px;color:#888;margin-top:2px}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:9px 18px;border-radius:var(--r);font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}

@media(max-width:680px){
  .layout{flex-direction:column}
  .cart-panel{width:100%;border-left:none;border-top:1px solid #e8e8e8;flex:none;max-height:44dvh}
  .catalogue{flex:1;min-height:0}
  .product-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));padding:6px;gap:6px}
  .top-title{display:none}
}
@media print{body *{visibility:hidden}#receipt-content,#receipt-content *{visibility:visible}#receipt-content{position:fixed;top:0;left:0;width:100%}}
</style>
</head>

// Flat lookup map for event delegation
const PRODUCT_MAP = {};
Object.values(CATALOGUE).forEach(prods => prods.forEach(p => { PRODUCT_MAP[p.id] = p; }));

const IMG = {};
const CAT_COLORS = {'Shakes & Smoothies':'#E91E8C','Superfood Bowls':'#27ae60','Immunity Press':'#e67e22','Nutritional Press':'#8e44ad','Juices':'#2980b9'};
const CAT_BG     = {'Shakes & Smoothies':'#fce4f0','Superfood Bowls':'#e8f8ee','Immunity Press':'#fef0e2','Nutritional Press':'#f2eafa','Juices':'#e3f2fb'};
const CAT_ICONS  = {'Shakes & Smoothies':'ti-cup','Superfood Bowls':'ti-bowl','Immunity Press':'ti-flask','Nutritional Press':'ti-pill','Juices':'ti-droplet'};

let cart = [], currentMember = null, memberDiscount = 0, currentCat = 'Shakes & Smoothies', paymentMethod = '';

try { salesLog = JSON.parse(localStorage.getItem('fruicey_pos_sales') || '[]'); } catch(e) { salesLog = []; }

// ── API ──────────────────────────────────────────────────────────────
function np(p){let d=(p||'').replace(/\D/g,'');if(d.startsWith('65')&&d.length>8)d=d.slice(2);return d;}
async function apiGet(params){const r=await fetch(API+'?'+new URLSearchParams(params));return r.json();}
async function apiPost(body){const r=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)});return r.json();}

// ── CLOCK ────────────────────────────────────────────────────────────
function updateClock(){
  const n=new Date();
  const el=document.getElementById('clock');
  if(el) el.textContent=n.toLocaleDateString('en-SG',{weekday:'short',day:'numeric',month:'short'})+' '+n.toLocaleTimeString('en-SG',{hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock,1000);

// ── MEMBER ───────────────────────────────────────────────────────────
async function lookupMember(){
  const phone=document.getElementById('member-phone').value.trim();
  if(!phone){showToast('Enter phone number');return;}
  const btn=document.getElementById('lookup-btn');
  btn.textContent='...';btn.disabled=true;
  try{
    const res=await apiGet({action:'getMember',phone:np(phone)});
    if(res.error==='not_found'){showToast('Member not found');clearMemberDisplay();}
    else if(res.member){
      currentMember=res.member;
      const tier=computeTier(res.member,res.transactions||[]);
      memberDiscount=tier.discount;
      showMemberDisplay(res.member,tier);
      showToast(res.member.first+' — '+tier.name+(tier.discount>0?' ('+tier.discount+'% off)':''));
    }
  }catch(e){showToast('Connection error');}
  btn.textContent='Look up';btn.disabled=false;
  updateTotals();
}

function computeTier(member,txns){
  const TIERS=[{name:'Member',min:0,discount:0},{name:'Gold',min:50,discount:5},{name:'Platinum',min:100,discount:10},{name:'Diamond',min:400,discount:15}];
  const now=new Date();
  let ps=member.tierSince?new Date(member.tierSince):new Date(member.since);
  let pe=new Date(ps);pe.setMonth(pe.getMonth()+2);
  while(pe<=now){ps=new Date(pe);pe=new Date(ps);pe.setMonth(pe.getMonth()+2);}
  const spend=(txns||[]).filter(t=>t.memberId===member.id&&new Date(t.date)>=ps&&new Date(t.date)<pe).reduce((s,t)=>s+parseFloat(t.amount||0),0);
  return TIERS.slice().reverse().find(t=>spend>=t.min)||TIERS[0];
}

function showMemberDisplay(m,tier){
  const TC={Member:'#888',Gold:'#b8860b',Platinum:'#607d8b',Diamond:'#1565c0'};
  const el=document.getElementById('member-result');
  el.style.display='block';
  el.innerHTML='<div style="display:flex;align-items:center;gap:10px">'
    +'<div style="width:34px;height:34px;border-radius:50%;background:'+TC[tier.name]+'22;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:'+TC[tier.name]+';flex-shrink:0">'+m.first[0].toUpperCase()+m.last[0].toUpperCase()+'</div>'
    +'<div style="flex:1"><div style="font-size:14px;font-weight:600">'+m.first+' '+m.last+'</div><div style="font-size:11px;color:#888">'+m.phone+'</div></div>'
    +'<div style="text-align:right"><div style="font-size:12px;font-weight:700;color:'+TC[tier.name]+'">'+tier.name+'</div>'
    +(tier.discount>0?'<div style="font-size:13px;color:#27ae60;font-weight:600">'+tier.discount+'% off</div>':'<div style="font-size:11px;color:#aaa">No discount</div>')+'</div></div>';
}
function clearMemberDisplay(){document.getElementById('member-result').style.display='none';}
function clearMember(){currentMember=null;memberDiscount=0;document.getElementById('member-phone').value='';clearMemberDisplay();updateTotals();showToast('Member cleared');}

// ── CATEGORIES ───────────────────────────────────────────────────────
function renderCats(){
  const tabs = document.getElementById('cat-tabs');
  tabs.innerHTML = '';
  Object.keys(CATALOGUE).forEach(function(cat){
    const active = cat === currentCat;
    const color  = CAT_COLORS[cat];
    const btn    = document.createElement('button');
    btn.className = 'cat-tab' + (active ? ' cat-active' : '');
    btn.dataset.cat = cat;
    btn.style.borderBottom = '3px solid ' + (active ? color : 'transparent');
    btn.style.color = active ? color : '#999';

    const icon = document.createElement('i');
    icon.className = 'ti ' + CAT_ICONS[cat];
    icon.style.cssText = 'font-size:18px;display:block';
    icon.setAttribute('aria-hidden','true');

    const lbl = document.createElement('span');
    lbl.style.cssText = 'font-size:10px;font-weight:' + (active?'600':'400');
    lbl.textContent = cat;

    btn.appendChild(icon);
    btn.appendChild(lbl);
    tabs.appendChild(btn);
  });
}

// ── PRODUCTS ─────────────────────────────────────────────────────────
function renderProducts(){
  const prods = CATALOGUE[currentCat];
  const color = CAT_COLORS[currentCat];
  const grid  = document.getElementById('product-grid');
  grid.innerHTML = '';

  prods.forEach(function(p){
    // Card wrapper
    const card = document.createElement('div');
    card.className = 'product-card';

    // Colour top strip (or image when available)
    const fileId = IMG[p.id];
    if(fileId){
      const img = document.createElement('img');
      img.src = 'https://drive.google.com/uc?export=view&id=' + fileId;
      img.style.cssText = 'width:100%;height:80px;object-fit:cover;border-radius:6px 6px 0 0;display:block';
      img.loading = 'lazy';
      card.appendChild(img);
    } else {
      const strip = document.createElement('div');
      strip.style.cssText = 'height:5px;background:' + color + ';border-radius:6px 6px 0 0';
      card.appendChild(strip);
    }

    // Body
    const body = document.createElement('div');
    body.style.cssText = 'padding:8px 8px 10px';

    // Product name
    const nameEl = document.createElement('div');
    nameEl.className = 'pname';
    nameEl.textContent = p.name;
    body.appendChild(nameEl);

    // Size buttons row
    const btnRow = document.createElement('div');
    btnRow.className = 'sbwrap';

    p.sizes.forEach(function(s){
      const btn = document.createElement('button');
      btn.className = 'size-btn';
      btn.style.borderColor = color;
      btn.style.color = color;
      btn.dataset.pid   = p.id;
      btn.dataset.size  = s.l || '';
      btn.dataset.price = String(s.p);
      btn.textContent   = (s.l ? s.l + ' ' : '') + '$' + s.p.toFixed(2);
      btnRow.appendChild(btn);
    });

    body.appendChild(btnRow);
    card.appendChild(body);
    grid.appendChild(card);
  });
}

// ── EVENT DELEGATION (fixes onclick in sandbox) ───────────────────────
document.addEventListener('click', function(e){
  // Category tab
  const catTab = e.target.closest('.cat-tab');
  if(catTab && catTab.dataset.cat){
    currentCat = decodeURIComponent(catTab.dataset.cat);
    renderCats(); renderProducts(); return;
  }
  // Size button
  const sizeBtn = e.target.closest('.size-btn');
  if(sizeBtn && sizeBtn.dataset.pid){
    const pid   = sizeBtn.dataset.pid;
    const size  = decodeURIComponent(sizeBtn.dataset.size||'');
    const price = parseFloat(sizeBtn.dataset.price);
    const prod  = PRODUCT_MAP[pid];
    if(!prod) return;
    const label = prod.name+(size?' ('+size+')':'');
    const existing = cart.find(i=>i.id===pid&&i.size===size);
    if(existing){existing.qty++;}
    else{cart.push({id:pid,name:prod.name,size,label,price,qty:1});}
    // Flash
    const color=CAT_COLORS[currentCat];
    sizeBtn.style.background=color;sizeBtn.style.color='#fff';
    setTimeout(()=>{sizeBtn.style.background='';sizeBtn.style.color=color;},220);
    renderCart(); return;
  }
  // Cart qty buttons
  const qBtn = e.target.closest('.cqbtn');
  if(qBtn){
    const i=parseInt(qBtn.dataset.i), d=parseInt(qBtn.dataset.d);
    cart[i].qty+=d;
    if(cart[i].qty<=0)cart.splice(i,1);
    renderCart(); return;
  }
  // Cart delete
  const dBtn = e.target.closest('.cdel');
  if(dBtn){
    cart.splice(parseInt(dBtn.dataset.i),1);
    renderCart(); return;
  }
  // Payment buttons
  const payBtn = e.target.closest('.pay-btn');
  if(payBtn && payBtn.dataset.method){
    paymentMethod=payBtn.dataset.method;
    document.querySelectorAll('.pay-btn').forEach(b=>b.classList.remove('pay-active'));
    payBtn.classList.add('pay-active'); return;
  }
});

// ── CART ─────────────────────────────────────────────────────────────
function renderCart(){
  const el=document.getElementById('cart-items');
  if(!cart.length){
    el.innerHTML='<div class="cart-empty"><div style="font-size:32px">🛒</div><div style="margin-top:8px;font-size:13px;color:#bbb;text-align:center">Cart is empty<br><span style="font-size:11px">Tap a product to add</span></div></div>';
    updateTotals(); return;
  }
  el.innerHTML=cart.map((item,i)=>
    '<div class="cart-row">'
    +'<div class="cart-info"><div class="cname">'+item.label+'</div><div style="font-size:11px;color:#bbb">$'+item.price.toFixed(2)+' each</div></div>'
    +'<div style="display:flex;align-items:center;gap:4px">'
    +'<button class="cqbtn" data-i="'+i+'" data-d="-1">−</button>'
    +'<span style="font-size:14px;font-weight:600;min-width:18px;text-align:center">'+item.qty+'</span>'
    +'<button class="cqbtn" data-i="'+i+'" data-d="1">+</button>'
    +'</div>'
    +'<div style="font-size:13px;font-weight:700;min-width:44px;text-align:right">$'+(item.price*item.qty).toFixed(2)+'</div>'
    +'<button class="cdel" data-i="'+i+'">✕</button>'
    +'</div>'
  ).join('');
  updateTotals();
}

function updateTotals(){
  const sub=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const disc=memberDiscount>0?+(sub*memberDiscount/100).toFixed(2):0;
  const total=+(sub-disc).toFixed(2);
  document.getElementById('sub-val').textContent='$'+sub.toFixed(2);
  const dr=document.getElementById('disc-row');
  if(disc>0){
    dr.style.display='flex';
    document.getElementById('disc-label').textContent=(currentMember?currentMember.first+"'s ":'')+memberDiscount+'% off';
    document.getElementById('disc-val').textContent='-$'+disc.toFixed(2);
  } else { dr.style.display='none'; }
  document.getElementById('total-val').textContent='$'+total.toFixed(2);
}

function clearCart(){
  if(cart.length && !confirm('Clear entire order?')) return;
  cart=[];currentMember=null;memberDiscount=0;paymentMethod='';
  document.getElementById('member-phone').value='';
  clearMemberDisplay();
  document.querySelectorAll('.pay-btn').forEach(b=>b.classList.remove('pay-active'));
  renderCart();
}

// ── CHECKOUT ─────────────────────────────────────────────────────────
async function checkout(){
  if(!cart.length){showToast('Cart is empty');return;}
  if(!paymentMethod){showToast('Select a payment method');return;}
  const sub=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const disc=memberDiscount>0?+(sub*memberDiscount/100).toFixed(2):0;
  const total=+(sub-disc).toFixed(2);
  const today=new Date().toISOString().split('T')[0];
  const btn=document.getElementById('checkout-btn');
  btn.textContent='Processing...';btn.disabled=true;
  try{
    if(currentMember){
      await apiPost({action:'addTransaction',memberId:currentMember.id,
        amount:total.toFixed(2),
        desc:'POS: '+cart.map(i=>i.qty+'x '+i.label).join(', '),
        date:today});
    }
    const sale={id:'sale_'+Date.now(),date:today,
      time:new Date().toLocaleTimeString('en-SG',{hour:'2-digit',minute:'2-digit'}),
      items:cart.map(i=>({...i})),subtotal:sub,discount:disc,total,
      payment:paymentMethod,
      member:currentMember?currentMember.first+' '+currentMember.last:null};
    salesLog.unshift(sale);
    try{localStorage.setItem('fruicey_pos_sales',JSON.stringify(salesLog.slice(0,500)));}catch(e){}
    showReceipt(sale);
  }catch(err){showToast('Error — please try again');}
  btn.textContent='Charge Customer';btn.disabled=false;
}

// ── RECEIPT ──────────────────────────────────────────────────────────
function showReceipt(sale){
  const disc=sale.discount;
  document.getElementById('receipt-content').innerHTML=
    '<div style="text-align:center;padding-bottom:14px;border-bottom:1px dashed #ddd;margin-bottom:14px">'
    +'<div style="font-size:20px;font-weight:800;color:#E91E8C">Fruicey</div>'
    +'<div style="font-size:12px;color:#888;margin-top:3px">'+sale.date+' · '+sale.time+'</div>'
    +(sale.member?'<div style="font-size:12px;color:#27ae60;margin-top:4px;font-weight:500">👋 '+sale.member+'</div>':'')
    +'<div style="font-size:12px;color:#888;margin-top:2px">'+sale.payment+'</div></div>'
    +sale.items.map(i=>'<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:7px"><span>'+i.qty+'× '+i.label+'</span><span style="font-weight:600">$'+(i.price*i.qty).toFixed(2)+'</span></div>').join('')
    +'<div style="border-top:1px dashed #ddd;margin-top:12px;padding-top:12px">'
    +'<div style="display:flex;justify-content:space-between;font-size:13px;color:#888;margin-bottom:5px"><span>Subtotal</span><span>$'+sale.subtotal.toFixed(2)+'</span></div>'
    +(disc>0?'<div style="display:flex;justify-content:space-between;font-size:13px;color:#27ae60;margin-bottom:5px"><span>Discount ('+memberDiscount+'%)</span><span>-$'+disc.toFixed(2)+'</span></div>':'')
    +'<div style="display:flex;justify-content:space-between;font-size:18px;font-weight:800;margin-top:8px"><span>Total</span><span style="color:#E91E8C">$'+sale.total.toFixed(2)+'</span></div></div>'
    +'<div style="text-align:center;margin-top:18px;font-size:12px;color:#bbb;padding-top:14px;border-top:1px dashed #ddd">Thank you for visiting Fruicey! 🍓<br>fruicey.sg</div>';
  document.getElementById('receipt-modal').classList.add('open');
}
function closeReceipt(){
  document.getElementById('receipt-modal').classList.remove('open');
  cart=[];paymentMethod='';
  document.querySelectorAll('.pay-btn').forEach(b=>b.classList.remove('pay-active'));
  renderCart();
}

// ── SALES REPORT ─────────────────────────────────────────────────────
function openSales(){renderSalesReport();document.getElementById('sales-modal').classList.add('open');}
function closeSales(){document.getElementById('sales-modal').classList.remove('open');}
function renderSalesReport(){
  const today=new Date().toISOString().split('T')[0];
  const ts=salesLog.filter(s=>s.date===today);
  const tRev=ts.reduce((s,r)=>s+r.total,0);
  document.getElementById('sales-summary').innerHTML=
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">'
    +'<div class="stat-box"><div class="stat-val" style="color:#E91E8C">$'+tRev.toFixed(2)+'</div><div class="stat-lbl">Today Revenue</div></div>'
    +'<div class="stat-box"><div class="stat-val">'+ts.length+'</div><div class="stat-lbl">Today Orders</div></div>'
    +'<div class="stat-box"><div class="stat-val" style="color:#27ae60">'+salesLog.length+'</div><div class="stat-lbl">All Orders</div></div>'
    +'</div>';
  const el=document.getElementById('sales-list');
  if(!salesLog.length){el.innerHTML='<div style="text-align:center;padding:2rem;color:#bbb">No sales yet</div>';return;}
  el.innerHTML=salesLog.slice(0,50).map(s=>
    '<div style="padding:10px 0;border-bottom:0.5px solid #f0f0f0">'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start">'
    +'<div><div style="font-size:13px;font-weight:500">'+s.date+' '+s.time+'</div>'
    +'<div style="font-size:11px;color:#aaa;margin-top:2px">'+s.payment+(s.member?' · '+s.member:'')+'</div>'
    +'<div style="font-size:11px;color:#ccc;margin-top:1px">'+s.items.map(i=>i.qty+'x '+i.label).join(', ')+'</div></div>'
    +'<div style="text-align:right;flex-shrink:0;margin-left:8px"><div style="font-size:14px;font-weight:700;color:#E91E8C">$'+s.total.toFixed(2)+'</div>'
    +(s.discount>0?'<div style="font-size:11px;color:#27ae60">-$'+s.discount.toFixed(2)+'</div>':'')+'</div>'
    +'</div></div>'
  ).join('');
}
function exportSalesCSV(){
  if(!salesLog.length){showToast('No sales to export');return;}
  const rows=[['Date','Time','Items','Subtotal','Discount','Total','Payment','Member']];
  salesLog.forEach(s=>rows.push([s.date,s.time,s.items.map(i=>i.qty+'x '+i.label).join(' | '),s.subtotal.toFixed(2),s.discount.toFixed(2),s.total.toFixed(2),s.payment,s.member||'']));
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='fruicey-sales-'+new Date().toISOString().split('T')[0]+'.csv';a.click();
  showToast('Exported!');
}
function clearSalesLog(){
  if(!confirm('Clear all sales history?'))return;
  salesLog=[];try{localStorage.removeItem('fruicey_pos_sales');}catch(e){}
  renderSalesReport();showToast('Sales history cleared');
}

// ── TOAST ─────────────────────────────────────────────────────────────
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}
